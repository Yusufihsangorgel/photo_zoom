name: photo_zoom
description: >-
  Pan, zoom, rotate and swipe a photo gallery. Double tap and pinch zoom where
  you touch; mouse wheel on desktop. A type-safe, maintained drop-in for
  photo_view.
version: 0.1.3
repository: https://github.com/Yusufihsangorgel/photo_zoom
issue_tracker: https://github.com/Yusufihsangorgel/photo_zoom/issues

topics:
  - image
  - zoom
  - gallery
  - viewer
  - gestures

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
