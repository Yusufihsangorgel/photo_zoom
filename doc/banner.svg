<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- type lockup, lower left -->
  <rect x="66" y="200" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="292" font-family="Menlo, monospace" font-size="64" font-weight="bold" fill="#E2E8F0">photo_zoom</text>
  <text x="66" y="338" font-family="Menlo, monospace" font-size="24" fill="#94A3B8">Pan, zoom and rotate images, anchored where you tap</text>

  <!-- motif: photo frame, off-centre focal point, zoom brackets around it -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- photo frame -->
    <rect x="836" y="104" width="252" height="176" rx="6" stroke="#1E3A5F" stroke-width="3"/>
    <!-- picture content, left half only, so the focal area stays clear -->
    <path d="M 852 254 L 936 174 L 984 222" stroke="#1E3A5F" stroke-width="3"/>
    <circle cx="892" cy="146" r="11" stroke="#1E3A5F" stroke-width="3"/>

    <!-- focal point, deliberately off centre: the whole point of the package -->
    <circle cx="1024" cy="192" r="6" fill="#38BDF8"/>
    <!-- zoom brackets expanding around the focal point -->
    <path d="M 986 172 L 986 154 L 1004 154" stroke="#38BDF8" stroke-width="3"/>
    <path d="M 1044 154 L 1062 154 L 1062 172" stroke="#38BDF8" stroke-width="3"/>
    <path d="M 1062 212 L 1062 230 L 1044 230" stroke="#38BDF8" stroke-width="3"/>
    <path d="M 1004 230 L 986 230 L 986 212" stroke="#38BDF8" stroke-width="3"/>
  </g>
</svg>
